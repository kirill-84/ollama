name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: chatbot_test
          POSTGRES_PASSWORD: chatbot_test
          POSTGRES_DB: chatbot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://chatbot_test:chatbot_test@localhost:5432/chatbot_test
      OLLAMA_MODE: mock
      OLLAMA_MODEL: qwen3.5:cloud
      TRAVELPAYOUTS_TOKEN: mock
      TRAVELPAYOUTS_MARKER: mock
      TRAVELPAYOUTS_MODE: mock
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Start dev server
        run: |
          npm run dev > logs.txt 2>&1 &
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          claude_args: |
            --append-system-prompt "Read CLAUDE.md and AGENTS.md in the repo root before starting any task.\
              Follow the conventions there strictly: SOLID, DRY, KISS, YAGNI; repository pattern; tests with every new module.\
              The project is a Russian-language chatbot for searching cheap flights to Sri Lanka (Colombo, CMB).\
              Stack: Next.js 15, TypeScript, Prisma 7, PostgreSQL, Tailwind v4, shadcn/ui, Ollama via ollama-js, Travelpayouts API.\
              Dev server runs at localhost:3000. Logs in logs.txt. DB via psql with DATABASE_URL env var.\
              External services are mocked in CI: OLLAMA_MODE=mock, TRAVELPAYOUTS_MODE=mock.\
              Use mcp__playwright tools to verify UI changes render correctly.\
              Work in a branch claude/issue-<num>-<slug>. Do NOT push to main directly."
            --max-turns 25
            --model claude-opus-4-7
            --allowedTools "Bash(npm:*),Bash(npx:*),Bash(psql:*),Bash(git:*),mcp__playwright__browser_navigate,mcp__playwright__browser_click,mcp__playwright__browser_wait_for,mcp__playwright__browser_resize,mcp__playwright__browser_take_screenshot,mcp__playwright__browser_type,mcp__playwright__browser_evaluate,mcp__playwright__browser_press_key,mcp__playwright__browser_snapshot,mcp__playwright__browser_console_messages,mcp__playwright__browser_select_option,mcp__playwright__browser_close,mcp__playwright__browser_drag,mcp__playwright__browser_hover,mcp__playwright__browser_file_upload,mcp__playwright__browser_fill_form,mcp__playwright__browser_install,mcp__playwright__browser_navigate_back,mcp__playwright__browser_network_requests,mcp__playwright__browser_handle_dialog,mcp__playwright__browser_tabs"
            --mcp-config '{"mcpServers": {"playwright": {"command": "npx", "args": ["@playwright/mcp@latest","--allowed-origins","localhost:3000;cdn.tailwindcss.com;esm.sh"]}}}'

          # This is an optional setting that allows Claude to read CI results on PRs
          # additional_permissions: |
            # actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr *)'
